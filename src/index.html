<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arch R Flasher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1><span class="arch">ARCH</span> <span class="r">R</span> <span class="flasher" data-i18n="title_flasher">FLASHER</span></h1>
    </header>

    <!-- Console selection -->
    <section class="section">
      <label class="section-label" data-i18n="console">1. Console</label>
      <div class="console-buttons">
        <button class="console-btn" id="btn-original" data-console="original">
          <strong data-i18n="original_name">R36S Original</strong>
          <small data-i18n="original_desc">6 panels</small>
        </button>
        <button class="console-btn" id="btn-clone" data-console="clone">
          <strong data-i18n="clone_name">R36S Clone</strong>
          <small data-i18n="clone_desc">12 panels</small>
        </button>
      </div>
    </section>

    <!-- Image selection (shown after console is chosen) -->
    <section class="section" id="image-section" style="display: none;">
      <label class="section-label" data-i18n="image">2. Image</label>
      <div class="image-info" id="image-info">
        <span id="image-name" data-i18n="no_image">No image selected</span>
        <span id="image-version" class="tag"></span>
      </div>
      <div class="image-actions">
        <button class="btn-secondary" id="btn-select-file" data-i18n="select_file">Select file</button>
        <button class="btn-secondary" id="btn-download" data-i18n="download_latest">Download latest version</button>
      </div>
    </section>

    <!-- Panel selection -->
    <section class="section" id="panel-section" style="display: none;">
      <label class="section-label" data-i18n="panel">3. Panel</label>
      <select id="panel-select" class="select">
        <option value="" data-i18n="select_panel">Select panel</option>
      </select>
    </section>

    <!-- Destination -->
    <section class="section" id="disk-section" style="display: none;">
      <label class="section-label" data-i18n="destination">4. Destination</label>
      <div class="disk-row">
        <select id="disk-select" class="select">
          <option value="" data-i18n="select_sd">Select SD card</option>
        </select>
        <button class="btn-icon" id="btn-refresh-disks" data-i18n-title="refresh_tooltip" title="Refresh list">&#x21bb;</button>
      </div>
    </section>

    <!-- Flash button -->
    <section class="section" id="flash-section" style="display: none;">
      <button class="btn-flash" id="btn-flash" disabled data-i18n="flash">FLASH</button>
    </section>

    <!-- Progress -->
    <section class="section" id="progress-section" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text">
        <span id="progress-percent">0%</span>
        <span id="progress-stage"></span>
      </div>
    </section>

    <!-- Status message -->
    <div id="status" class="status"></div>
  </div>

  <!-- Confirmation dialog -->
  <div class="dialog-overlay" id="confirm-dialog" style="display: none;">
    <div class="dialog">
      <h3 data-i18n="confirm_title">Confirm flash</h3>
      <p id="confirm-text"></p>
      <p class="warning" data-i18n="confirm_warning">ALL DATA ON THE SD CARD WILL BE ERASED!</p>
      <div class="dialog-buttons">
        <button class="btn-secondary" id="btn-cancel" data-i18n="cancel">Cancel</button>
        <button class="btn-danger" id="btn-confirm" data-i18n="confirm">Flash</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
