<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arch R Flasher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1><span class="arch">ARCH</span> <span class="r">R</span> <span class="flasher">FLASHER</span></h1>
    </header>

    <!-- Image info -->
    <section class="section" id="image-section">
      <label class="section-label">Imagem</label>
      <div class="image-info" id="image-info">
        <span id="image-name">Nenhuma imagem selecionada</span>
        <span id="image-version" class="tag"></span>
      </div>
      <div class="image-actions">
        <button class="btn-secondary" id="btn-select-file">Selecionar arquivo</button>
        <button class="btn-secondary" id="btn-download">Baixar ultima versao</button>
      </div>
    </section>

    <!-- Console selection -->
    <section class="section">
      <label class="section-label">1. Console</label>
      <div class="console-buttons">
        <button class="console-btn" id="btn-original" data-console="original">
          <strong>R36S Original</strong>
          <small>6 paineis</small>
        </button>
        <button class="console-btn" id="btn-clone" data-console="clone">
          <strong>R36S Clone</strong>
          <small>12 paineis</small>
        </button>
      </div>
    </section>

    <!-- Panel selection -->
    <section class="section" id="panel-section" style="display: none;">
      <label class="section-label">2. Painel</label>
      <select id="panel-select" class="select">
        <option value="">Selecione o painel</option>
      </select>
    </section>

    <!-- Destination -->
    <section class="section" id="disk-section" style="display: none;">
      <label class="section-label">3. Destino</label>
      <div class="disk-row">
        <select id="disk-select" class="select">
          <option value="">Selecione o SD card</option>
        </select>
        <button class="btn-icon" id="btn-refresh-disks" title="Atualizar lista">&#x21bb;</button>
      </div>
    </section>

    <!-- Flash button -->
    <section class="section" id="flash-section" style="display: none;">
      <button class="btn-flash" id="btn-flash" disabled>GRAVAR</button>
    </section>

    <!-- Progress -->
    <section class="section" id="progress-section" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text">
        <span id="progress-percent">0%</span>
        <span id="progress-stage"></span>
      </div>
    </section>

    <!-- Status message -->
    <div id="status" class="status"></div>
  </div>

  <!-- Confirmation dialog -->
  <div class="dialog-overlay" id="confirm-dialog" style="display: none;">
    <div class="dialog">
      <h3>Confirmar gravacao</h3>
      <p id="confirm-text"></p>
      <p class="warning">TODOS OS DADOS DO SD SERAO APAGADOS!</p>
      <div class="dialog-buttons">
        <button class="btn-secondary" id="btn-cancel">Cancelar</button>
        <button class="btn-danger" id="btn-confirm">Gravar</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
